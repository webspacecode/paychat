            <!-- Login Form -->

                        />

                    <!-- Username Input -->
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                            </svg>
                        </div>
                        <input

                            placeholder="Username"

                        />
                    </div>

                    <!-- Password Input -->
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2zm10-10V7a4 4 0 0 0-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input
                            type="password"
                            placeholder="Password"
                            class="w-full pl-12 pr-4 py-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all duration-200 text-slate-700 placeholder-slate-400"
                        />
                    </div>

                    <!-- Login Button -->
                    <button
                        type="submit"
                        class="w-full bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-500 hover:to-yellow-600 text-slate-800 font-semibold py-4 px-6 rounded-xl transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg hover:shadow-xl mt-6"
                    >
                        Login
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center my-6">
                    <div class="flex-1 border-t border-slate-200"></div>
                    <span class="px-4 text-red-500 font-medium text-sm">OR</span>
                    <div class="flex-1 border-t border-slate-200"></div>
                </div>

                <!-- Send OTP Link -->
                <div class="text-center">
                    <button
                        type="button"
                        class="text-slate-500 hover:text-slate-700 font-medium transition-colors duration-200"
                        onclick="handleSendOTP()"
                    >
                        Send OTP
                    </button>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-6">
                <p class="text-slate-400 text-sm">
                    Don't have an account?
                    <button class="text-blue-600 hover:text-blue-700 font-medium transition-colors duration-200 ml-1" onclick="handleSignUp()">
                        Sign up
                    </button>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Basic form handling
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const shopSlug = document.querySelector('input[placeholder="Shop Slug"]').value;
            const username = document.querySelector('input[placeholder="Username"]').value;
            const password = document.querySelector('input[placeholder="Password"]').value;
            
            if (!shopSlug || !username || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            // Add your login logic here
            console.log('Login attempt:', { shopSlug, username, password });
            // alert('Login functionality would be implemented here');
            window.location.href = "products.html"
        });

        function handleSendOTP() {
            // Add OTP logic here
            alert('Send OTP functionality would be implemented here');
        }

        function handleSignUp() {
            // Add sign up logic here
            alert('Sign up functionality would be implemented here');
        }

        // Add loading state to login button
        function showLoading(button) {
            button.innerHTML = 'Logging in...';
            button.disabled = true;
        }

        function hideLoading(button) {
            button.innerHTML = 'Login';
            button.disabled = false;
        }
    </script>
